name: Build Alpine Linux Native Image

on:
  workflow_dispatch:

  push:
    branches:
      - feature/alpine-native-image
    paths:
      - "question-service/**"
      - ".github/workflows/alpine-native-image.yml"

jobs:
  native-build:
    name: Build Question Service Native (Linux)

    runs-on: ubuntu-24.04-arm

    defaults:
      run:
        shell: bash
        working-directory: question-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Verify GraalVM Installation
        run: |
          java -version
          native-image --version
      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Native Image
        run: ./mvnw -Pnative -Dmaven.test.skip=true native:compile

      - name: Show Build Output
        run: ls -lh target/

      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: question-service-native-alpine
          path: |
            question-service/target/question-service
