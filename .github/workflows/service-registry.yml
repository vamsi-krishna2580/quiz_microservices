name: Build & Push Eureka Server (JVM)

on:
  workflow_dispatch:

  push:
    branches:
      - native-microservices
    paths:
      - "service-registry/**"
      - ".github/workflows/service-registry.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: service-registry

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Eureka Server
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./service-registry
          file: ./service-registry/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/service-registry:latest
            ghcr.io/${{ github.repository_owner }}/service-registry:${{ github.sha }}